<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | MyDhobhiGhat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Crisp, premium laundry aesthetic with a subtle dark overlay for text readability */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1582735689369-4fe89db7114c?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
            color: #fff; /* Premium White Text */
            overflow: hidden;
        }

        /* Pure Text Layout */
        .content {
            text-align: center;
            padding: 2rem;
            animation: fadeIn 2s ease-out;
            max-width: 900px;
            width: 90%;
            z-index: 10;
        }

        .brand-name {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 5rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
            letter-spacing: -2px;
            line-height: 1.1;
        }

        p.subtitle {
            font-size: 1.3rem;
            font-weight: 300;
            margin-top: 20px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            line-height: 1.6;
            color: #f8f9fa;
        }

        /* Footer Styling */
        footer {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            font-size: 0.95rem;
            color: #ffffff; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            letter-spacing: 0.5px;
        }

        footer a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        footer a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 { font-size: 3.5rem; }
            p.subtitle { font-size: 1.1rem; }
            .brand-name { font-size: 1.2rem; }
        }

        @media (max-width: 480px) {
            h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="brand-name">MyDhobhiGhat</div>
        <h1>Freshness is<br>Loading.</h1>
        <p class="subtitle">Premium care for your garments. We are currently preparing to redefine your everyday laundry experience.</p>
    </div>

    <footer>
        Designed and developed by <a href="https://zen-tech.vercel.app" target="_blank" rel="noopener noreferrer">Zen-Tech</a>
    </footer>

</body>
</html>
