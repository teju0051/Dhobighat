  function initializeCountdown() {
      // Set the date we're counting down to: March 19, 2026 at 00:00:00
      const targetDate = new Date("March 19, 2026 00:00:00").getTime();
      const overlay = document.getElementById("countdown-overlay");

      function updateTimer() {
          const now = new Date().getTime();
          const distance = targetDate - now;

          // If the countdown is over, hide the overlay and enable scrolling
          if (distance < 0) {
              overlay.classList.add("opacity-0"); // Fade out effect
              setTimeout(() => {
                  overlay.style.display = "none";
                  document.body.style.overflow = "auto"; // Restore scrolling
              }, 500); 
              return true; // Indicates timer is finished
          }

          // Otherwise, block scrolling
          document.body.style.overflow = "hidden";

          // Calculate time logic
          const days = Math.floor(distance / (1000 * 60 * 60 * 24));
          const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((distance % (1000 * 60)) / 1000);

          // Render into HTML
          document.getElementById("days").innerText = days.toString().padStart(2, '0');
          document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
          document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
          document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
          
          return false; // Indicates timer is still running
      }

      // Run once immediately so the user doesn't see "00" for a second
      const isFinished = updateTimer();

      // If not finished, start the interval
      if (!isFinished) {
          const timerInterval = setInterval(() => {
              if (updateTimer()) {
                  clearInterval(timerInterval);
              }
          }, 1000);
      }
  }

  // Start the countdown script
