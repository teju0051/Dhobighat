<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Resource Not Found | MyDhobhiGhat</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

    <style>
        :root {
            --mdg-primary: #0A2540; /* Deep Navy */
            --mdg-accent: #0061FF;  /* Premium Blue */
            --mdg-bg: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--mdg-bg);
            color: var(--mdg-primary);
            overflow-x: hidden;
        }

        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-code {
            font-family: 'Playfair Display', serif;
            font-size: clamp(8rem, 20vw, 12rem);
            line-height: 1;
            font-weight: 600;
            letter-spacing: -0.05em;
            color: var(--mdg-primary);
            opacity: 0.08;
            position: absolute;
            z-index: 0;
        }

        .content-box {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .service-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--mdg-accent);
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: block;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .description {
            font-weight: 300;
            color: #64748b;
            max-width: 450px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.8;
        }

        .btn-premium {
            background-color: var(--mdg-primary);
            color: white;
            border-radius: 0; /* Sharp edges for professional look */
            padding: 1rem 2.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-weight: 600;
            transition: all 0.4s ease;
            border: 1px solid var(--mdg-primary);
        }

        .btn-premium:hover {
            background-color: transparent;
            color: var(--mdg-primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        footer {
            position: absolute;
            bottom: 2rem;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            color: #94a3b8;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code select-none">404</div>

        <div class="content-box">
            <span class="service-tag">MyDhobhiGhat | Premium Care</span>
            
            <h1>Page Not Found</h1>
            
            <p class="description">
                The page you are attempting to access is currently unavailable or has been permanently relocated within our archive.
            </p>

            <button class="btn btn-premium" onclick="window.location.href='https://mydhobhighat.com'">
                Return to Homepage
            </button>
        </div>
    </div>

    <footer>
        &copy; 2026 MyDhobhiGhat &bull; International Standards of Care
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
